<!DOCTYPE html> 
<html>
    <head>
        <title>Band Infos</title>
    </head>
    <body>
        <div>
            <img src="{{.Image}}">
            <h3>Concerts:</h3>
            {{range $location, $dates := .DatesLocations}}
                <h4>{{$location}}</h4>
                <ul>
                {{range $dates}}
                    <li>{{.}}</li>
                {{end}}
                </ul>
            {{end}}
        </div>
    </body>
</html>
